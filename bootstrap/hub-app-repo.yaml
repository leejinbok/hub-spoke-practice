apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hub-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/leejinbok/hub-spoke-practice.git'
    path: 'helm' # Path to where Chart.yaml lives
    targetRevision: HEAD
    helm:
      valueFiles:
      - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
