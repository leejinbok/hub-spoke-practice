# values.yaml
teams:
  - name: team-one
    repoURL: 'https://github.com/leejinbok/hub-spoke-practice.git'
    targetPath: 'spokes/team-one'
    targetRevision: 'main'
    resourceQuota:
      pods: "5"
      requests:
        cpu: "2"
        memory: "4Gi"
    limitRange:
      max:
        cpu: "256m"
        memory: "200Mi"
      min:
        cpu: "100m"
        memory: "100Mi"
      defaultRequest:
        cpu: "250m"
        memory: "500Mi"

  - name: team-two
    repoURL: 'https://github.com/leejinbok/hub-spoke-practice.git'
    targetPath: 'spokes/team-two'
    targetRevision: 'main'
    resourceQuota:
      pods: "4"
    limitRange:
      defaultRequest:
        cpu: "250m"
        memory: "500Mi"