{{- range .Values.teams }}

{{- $rq := .resourceQuota | default dict -}}
{{- $req := $rq.requests | default dict -}}
{{- $lim := $rq.limits | default dict -}}

apiVersion: v1
kind: ResourceQuota
metadata:
  name: {{ .name }}-resource-quota
  namespace: {{ .name }}-ns
spec:
  hard:
    pods: {{ $rq.pods | default "10" | quote }}
    requests.cpu: {{ $req.cpu | default "1" | quote }}
    requests.memory: {{ $req.memory | default "1Gi" | quote }}
    limits.cpu: {{ $lim.cpu | default "2" | quote }}
    limits.memory: {{ $lim.memory | default "4Gi" | quote }}
---
{{- end }}