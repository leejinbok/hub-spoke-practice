{{- range .Values.teams }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .name }}-app
  namespace: argocd
spec:
  project: {{ .name }}-project 
  
  source: 
    repoURL: {{ .repoURL | quote }}
    path: {{ .targetPath | quote }}
    targetRevision: {{ .targetRevision | quote }}
  
  destination: 
    server: https://kubernetes.default.svc
    namespace: {{ .name }}-ns
    
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
{{- end }}