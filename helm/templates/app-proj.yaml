{{- range .Values.teams }}
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: {{ .name }}-project
  namespace: argocd
spec:
  description: "Automated project creation for {{ .name }}"
  sourceRepos:
  - {{ .repoURL | quote }}
  destinations:
  - namespace: {{ .name }}-ns
    server: https://kubernetes.default.svc
  namespaceResourceWhitelist:
  - group: 'apps'
    kind: Deployment
  - group: ''
    kind: Service
  - group: ''
    kind: ConfigMap
---
{{- end }}